# SonarCloud: análise e cobertura vêm dos workflows GitHub Actions (.github/workflows/ci.yml e sonar.yml).
# Pytest e Vitest correm aí; scripts/patch_*.py só normalizam relatórios para o Sonar (não substituem o CI).
sonar.organization=zilioalberto
sonar.projectKey=zilioalberto_Configurador_Paineis_Eletricos
sonar.projectName=Configurador Painel Eletrico
sonar.projectVersion=1.0

sonar.sources=backend,frontend/src
sonar.tests=backend/config/tests,backend/core/tests,backend/apps/accounts/tests,backend/apps/cadastros/tests,backend/apps/catalogo/tests,backend/apps/configurador_paineis/projetos/tests,backend/apps/configurador_paineis/cargas/tests,backend/apps/configurador_paineis/composicao_painel/tests,backend/apps/configurador_paineis/dimensionamento/tests,backend/apps/fiscal/tests,backend/apps/orcamentos/tests,backend/apps/rh/tests,backend/apps/tarefas/tests
sonar.test.inclusions=**/test_*.py,**/*_test.py
sonar.exclusions=**/node_modules/**,**/dist/**,**/__pycache__/**,**/migrations/**,**/.venv/**,**/venv/**,**/build/**,**/tests/**,**/apps/orcamentos/scripts/gerar_template_oferta_v9.py
sonar.coverage.exclusions=**/node_modules/**,**/dist/**,**/migrations/**,**/main.tsx,**/*.test.ts,**/*.test.tsx,**/test/**,**/tests/**,**/vite-env.d.ts,**/manage.py,**/wsgi.py,**/asgi.py,**/*.registry.tsx,**/DimensionamentoWizardShell.tsx
sonar.sourceEncoding=UTF-8
sonar.python.version=3.12

# coverage.xml: após pytest no workflow, patch_cobertura_for_sonar.py prefixa "backend/" nos paths (Sonar alinha com sonar.sources).
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# URIs XML (OOXML, W3C, SEFAZ) usam esquema http como identificador — não são chamadas de rede.
sonar.issue.ignore.multicriteria=ooxml_namespace_uri,sefaz_xml_namespace_uri,void_fire_and_forget,lxml_find_optional
sonar.issue.ignore.multicriteria.ooxml_namespace_uri.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.ooxml_namespace_uri.resourceKey=**/apps/orcamentos/constants.py
sonar.issue.ignore.multicriteria.sefaz_xml_namespace_uri.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.sefaz_xml_namespace_uri.resourceKey=**/apps/fiscal/services/sefaz/xml_namespaces.py
# `void promise` é convenção intencional do projeto para descartar promises "fire-and-forget"
# (deixa explícito que não aguardamos o resultado); não há regra no-floating-promises ativa.
sonar.issue.ignore.multicriteria.void_fire_and_forget.ruleKey=typescript:S3735
sonar.issue.ignore.multicriteria.void_fire_and_forget.resourceKey=**/*
# lxml Element.find() retorna Optional[Element]; o `is None` é necessário (falso positivo do Sonar).
sonar.issue.ignore.multicriteria.lxml_find_optional.ruleKey=python:S5727
sonar.issue.ignore.multicriteria.lxml_find_optional.resourceKey=**/apps/fiscal/services/sefaz/manifestacao.py
