services:
  db:
    image: postgres:16-alpine
    container_name: configurador_painel_db
    restart: always
    env_file:
      - /opt/zfw/shared/.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: configurador_painel_backend
    restart: always
    environment:
      DJANGO_ENV: production
      DJANGO_DEBUG: "false"
    env_file:
      - /opt/zfw/shared/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /opt/zfw/secrets/certificado-a1.pfx:/run/secrets/zfw-certificado-a1.pfx:ro
    ports:
      - "127.0.0.1:8000:8000"
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "

  backend-scheduler:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: configurador_painel_backend_scheduler
    restart: always
    environment:
      DJANGO_ENV: production
      DJANGO_DEBUG: "false"
    env_file:
      - /opt/zfw/shared/.env
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - /opt/zfw/secrets/certificado-a1.pfx:/run/secrets/zfw-certificado-a1.pfx:ro
    command: ["python", "manage.py", "fiscal_sync_scheduler"]

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    container_name: configurador_painel_frontend
    restart: always
    depends_on:
      - backend
    # Vite em modo default usa .env.development → localhost na API (no browser = PC do usuário).
    # remote carrega .env.remote → https://api.zfw.com.br/api/v1
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--mode", "remote"]
    ports:
      - "127.0.0.1:5173:5173"

volumes:
  postgres_data:
