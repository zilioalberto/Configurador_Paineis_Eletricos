services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: configurador_painel_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
      - postgres_exporter
      - blackbox_exporter

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: configurador_painel_alertmanager
    restart: unless-stopped
    env_file:
      - ../../.env
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        : "$${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN ausente}"
        : "$${TELEGRAM_CHAT_ID:?TELEGRAM_CHAT_ID ausente}"
        printf '%s' "$$TELEGRAM_BOT_TOKEN" > /tmp/telegram_bot_token
        sed "s/__TELEGRAM_CHAT_ID__/$${TELEGRAM_CHAT_ID}/g" /etc/alertmanager/alertmanager.yml > /tmp/alertmanager.yml
        chmod 0400 /tmp/telegram_bot_token
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ../monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager

  grafana:
    image: grafana/grafana:11.4.0
    container_name: configurador_painel_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: grafana_db:5432
      GF_DATABASE_NAME: ${GRAFANA_DB_NAME:-grafana}
      GF_DATABASE_USER: ${GRAFANA_DB_USER:-grafana}
      GF_DATABASE_PASSWORD: ${GRAFANA_DB_PASSWORD}
      GF_DATABASE_SSL_MODE: disable
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
      grafana_db:
        condition: service_healthy

  grafana_db:
    image: postgres:16-alpine
    container_name: configurador_painel_grafana_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GRAFANA_DB_NAME:-grafana}
      POSTGRES_USER: ${GRAFANA_DB_USER:-grafana}
      POSTGRES_PASSWORD: ${GRAFANA_DB_PASSWORD}
    volumes:
      - grafana_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: configurador_painel_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_USER:-configurador_painel}:${DB_PASSWORD}@db:5432/${DB_NAME:-configurador_painel}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  blackbox_exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: configurador_painel_blackbox_exporter
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ../monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  grafana_postgres_data:
