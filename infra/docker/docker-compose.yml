services:
  db:
    image: postgres:16-alpine
    container_name: configurador_painel_db
    restart: unless-stopped
    environment:
      # Palavra-passe sem valor por omissão no compose (evita S2068 / credenciais em ficheiro).
      # Defina DB_NAME, DB_USER e DB_PASSWORD no .env na raiz (ver .env.example).
      POSTGRES_DB: ${DB_NAME:-configurador_painel}
      POSTGRES_USER: ${DB_USER:-configurador_painel}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_EXTERNAL_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  backend:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: configurador_painel_backend
    restart: unless-stopped
    environment:
      DJANGO_ENV: development
    # Bind mount no Windows pode trazer CRLF; tr evita ": not found" / "set: Illegal option"
    command: ["sh", "-c", "tr -d '\\r' < /app/entrypoint.backend.sh | sh -s"]
    volumes:
      - ../../backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    container_name: configurador_painel_frontend
    restart: unless-stopped
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ../../.env
    depends_on:
      - backend

volumes:
  postgres_data:
