services:
  db:
    image: postgres:16-alpine
    container_name: configurador_painel_db
    restart: unless-stopped
    environment:
      # Sem env_file aqui: o .env global costuma trazer DB_PASSWORD= vazio ou outras
      # variáveis que quebram o init do Postgres se forem injetadas como POSTGRES_*.
      POSTGRES_DB: ${DB_NAME:-configurador_painel}
      POSTGRES_USER: ${DB_USER:-configurador_painel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-configurador_painel}
    ports:
      - "${DB_EXTERNAL_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  backend:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: configurador_painel_backend
    restart: unless-stopped
    environment:
      DJANGO_ENV: development
    # Bind mount no Windows pode trazer CRLF; tr evita ": not found" / "set: Illegal option"
    command: ["sh", "-c", "tr -d '\\r' < /app/entrypoint.backend.sh | sh -s"]
    volumes:
      - ../../backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    container_name: configurador_painel_frontend
    restart: unless-stopped
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ../../.env
    depends_on:
      - backend

  sonar_db:
    profiles: ["sonar"]
    image: postgres:16-alpine
    container_name: configurador_painel_sonar_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SONAR_DB_NAME:-sonar}
      POSTGRES_USER: ${SONAR_DB_USER:-sonar}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
    ports:
      - "${SONAR_DB_EXTERNAL_PORT:-15433}:5432"
    volumes:
      - sonar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  sonarqube:
    profiles: ["sonar"]
    image: sonarqube:community
    container_name: configurador_painel_sonarqube
    restart: unless-stopped
    depends_on:
      sonar_db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar_db:5432/${SONAR_DB_NAME:-sonar}
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
    ports:
      - "${SONAR_EXTERNAL_PORT:-9000}:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

volumes:
  postgres_data:
  sonar_postgres_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions: