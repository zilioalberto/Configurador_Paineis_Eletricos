name: SonarCloud

on:
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main, dev]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    concurrency:
      group: sonar-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Testes e cobertura (Django) — neste workflow, não via scripts locais
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          DJANGO_SETTINGS_MODULE: configuracoes.settings_ci
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pytest backend/configuracoes/tests backend/accounts/tests backend/projetos/tests \
            backend/composicao_painel/tests backend/cargas/tests backend/catalogo/tests \
            -q --tb=short \
            --cov=backend \
            --cov-config=.coveragerc \
            --cov-report=xml:coverage.xml

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Testes e cobertura (frontend) — neste workflow, não via scripts locais
        working-directory: frontend
        run: |
          npm ci
          npm run test:coverage

      - name: Ajustar Cobertura Python para o Sonar
        run: python scripts/patch_cobertura_for_sonar.py coverage.xml

      - name: Ajustar caminhos LCOV para o Sonar
        run: python scripts/patch_lcov_for_sonar.py frontend/coverage/lcov.info

      - name: Verificar relatórios de cobertura
        run: |
          test -s coverage.xml
          test -s frontend/coverage/lcov.info
          grep -q 'filename="backend/' coverage.xml || (echo "coverage.xml sem prefixo backend/"; exit 1)

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
