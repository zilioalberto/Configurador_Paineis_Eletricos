name: SonarCloud

on:
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main, dev]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    concurrency:
      group: sonar-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Testes e cobertura (Django)
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          DJANGO_SETTINGS_MODULE: configuracoes.settings_ci
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pytest backend/configuracoes/tests -q --tb=short \
            --cov=accounts --cov=catalogo --cov=projetos --cov=cargas \
            --cov=dimensionamento --cov=selecao_componentes --cov=composicao_painel \
            --cov=wizard --cov=documentos --cov=core --cov=configuracoes \
            --cov-report=xml:backend/coverage.xml

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Testes e cobertura (frontend)
        working-directory: frontend
        run: |
          npm ci
          npm run test:coverage

      - name: Ajustar caminhos LCOV para o Sonar
        run: python scripts/patch_lcov_for_sonar.py frontend/coverage/lcov.info

      - name: Verificar relatórios de cobertura
        run: |
          test -s backend/coverage.xml
          test -s frontend/coverage/lcov.info

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
