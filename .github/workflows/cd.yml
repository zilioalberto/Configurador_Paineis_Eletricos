name: CD - Deploy Produção

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      reset_db:
        description: "Resetar banco de dados? Use true apenas em ambiente não produtivo."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy no VPS
    runs-on: ubuntu-latest

    steps:
      - name: Executar deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          debug: false
          command_timeout: 40m
          script: |
            set -e

            RESET_DB="${{ github.event.inputs.reset_db || 'false' }}"

            echo "Iniciando deploy do commit: ${{ github.sha }}"
            echo "RESET_DB=${RESET_DB}"

            RESET_DB="${RESET_DB}" /opt/zfw/scripts/run_deploy.sh "${{ github.sha }}"
