name: CI

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]

jobs:
  backend:
    name: CI / Backend - Django
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov

      - name: Testes unitários com cobertura (Django) — GitHub Actions, não scripts locais
        working-directory: ${{ github.workspace }}
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          DJANGO_SETTINGS_MODULE: configuracoes.settings_ci
        run: |
          pytest backend/configuracoes/tests backend/accounts/tests backend/projetos/tests \
            --cov=backend \
            --cov-config=.coveragerc \
            --cov-report=xml:coverage.xml \
            --cov-report=term \
            -q --tb=short

      - name: Ajustar Cobertura Python para o Sonar
        working-directory: ${{ github.workspace }}
        run: |
          python scripts/patch_cobertura_for_sonar.py coverage.xml
          grep -q 'filename="backend/' coverage.xml

      - name: Validar sintaxe Python
        run: python -m compileall .

      - name: Salvar coverage do backend
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: coverage.xml

  frontend:
    name: CI / Frontend - React
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Testes unitários com cobertura (Vitest) — GitHub Actions, não scripts locais
        run: npm run test:coverage

      - name: Build do frontend
        run: npm run build

      - name: Salvar coverage do frontend
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/lcov.info

  sonar:
    name: CI / SonarCloud
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Baixar coverage do backend
        uses: actions/download-artifact@v4
        with:
          name: coverage-backend
          path: .

      - name: Baixar coverage do frontend
        uses: actions/download-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage

      - name: Verificar arquivos gerados
        run: |
          ls -lah
          ls -lah frontend/coverage || true
          test -s coverage.xml
          test -s frontend/coverage/lcov.info
          grep -q 'filename="backend/' coverage.xml || (echo "coverage.xml sem prefixo backend/ (Sonar ficaria a 0% no backend)"; exit 1)

      - name: Ajustar caminhos LCOV para o Sonar
        run: python scripts/patch_lcov_for_sonar.py frontend/coverage/lcov.info

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
