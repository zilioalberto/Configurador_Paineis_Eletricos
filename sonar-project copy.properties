# SonarCloud: análise e cobertura vêm dos workflows GitHub Actions (.github/workflows/ci.yml e sonar.yml).
# Pytest e Vitest correm aí; scripts/patch_*.py só normalizam relatórios para o Sonar (não substituem o CI).
#
# ALINHAMENTO CI ↔ SONAR (pastas de testes Python):
# Os mesmos paths passados ao pytest em ci.yml / sonar.yml devem aparecer em sonar.tests abaixo,
# para o Sonar classificar esses ficheiros como testes (e não como código de produção).
# Apps sem pasta tests/ própria não entram na lista.
#
# Frontend (Vitest): testes em frontend/src/**/*.test.ts(x). O Sonar não usa sonar.tests para JS
# colocalizado; o relatório vem de sonar.javascript.lcov.reportPaths. Estes ficheiros já estão em
# sonar.coverage.exclusions para não diluir a cobertura de código de produção.
#
sonar.organization=zilioalberto
sonar.projectKey=zilioalberto_Configurador_Paineis_Eletricos
sonar.projectName=Configurador Painel Eletrico
sonar.projectVersion=1.0

sonar.sources=backend,frontend/src
sonar.tests=backend/configuracoes/tests,backend/accounts/tests,backend/projetos/tests,backend/catalogo/tests,backend/composicao_painel/tests,backend/cargas/tests,backend/dimensionamento/tests,backend/core/tests
sonar.test.inclusions=**/test_*.py,**/*_test.py
sonar.exclusions=**/node_modules/**,**/dist/**,**/__pycache__/**,**/migrations/**,**/.venv/**,**/venv/**,**/build/**,**/backend/scripts/**
sonar.coverage.exclusions=**/node_modules/**,**/dist/**,**/migrations/**,**/main.tsx,**/*.test.ts,**/*.test.tsx,**/test/**,**/tests/**,**/vite-env.d.ts,**/manage.py,**/wsgi.py,**/asgi.py,**/backend/scripts/**
sonar.sourceEncoding=UTF-8
sonar.python.version=3.12

# coverage.xml: após pytest no workflow, patch_cobertura_for_sonar.py prefixa "backend/" nos paths (Sonar alinha com sonar.sources).
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info